name: Weekly context update

# Sunday-evening curation of config/context.md (the societal-context board the
# foresight synthesis reasons over): a Claude web-search pass corrects stale facts,
# adds major dated developments, and prunes superseded items — validated so a bad
# reply never clobbers the file, and committed for human review/revert. Runs 12h
# before Monday's 06:00 UTC data refresh so that refresh synthesizes on a current board.

on:
  schedule:
    - cron: "0 18 * * 0"   # Sundays 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-snapshot     # share with the refreshes so commits never race
  cancel-in-progress: false

jobs:
  context:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt anthropic

      - name: Update societal context via web search
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/update_context.py

      - name: Commit updated context
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/context.md
          if git diff --cached --quiet; then
            echo "No context changes."
          else
            git commit -m "chore: weekly societal-context update $(date -u +%Y-%m-%d)"
            git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}" || {
              echo "rebase failed; aborting cleanly"; git rebase --abort || true; exit 1;
            }
            git push
            git push origin "HEAD:claude/ai-safety-foresight-analysis-fletm1" || \
              echo "feature branch not fast-forwardable; skipped"
          fi
