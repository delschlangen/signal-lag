name: Foresight refresh (context-only)

# Re-runs ONLY the Foresight Gap synthesis against the already-committed snapshot and
# the current config/context.md, then commits the updated snapshot. No data pull — use
# this for a fast turnaround after editing config/context.md (the weekly full refresh
# regenerates everything, including foresight, on its own).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-snapshot       # share with the weekly refresh so they never race
  cancel-in-progress: false

jobs:
  foresight:
    runs-on: ubuntu-latest
    timeout-minutes: 25      # synthesis + parallel web-search verification
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt anthropic

      - name: Re-run foresight against current context.md
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/refresh_snapshot.py --foresight-only

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          [ -f data/history.json ] && git add data/history.json || true
          [ -f data/risk_register.json ] && git add data/risk_register.json || true
          [ -f data/verify_cache.json ] && git add data/verify_cache.json || true
          [ -f data/benchmark_history.json ] && git add data/benchmark_history.json || true
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore: foresight refresh (context) $(date -u +%Y-%m-%d)"
            # -X theirs: favor this run's regenerated files if main moved underneath us
            # (see refresh.yml — a bare rebase conflicts on the big snapshot JSON).
            git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}" || {
              echo "rebase failed; aborting cleanly"; git rebase --abort || true; exit 1;
            }
            git push
            # Mirror to the dev branch too (fast-forward only).
            git push origin "HEAD:claude/ai-safety-foresight-analysis-fletm1" || \
              echo "feature branch not fast-forwardable; skipped"
          fi
