name: Weekly data refresh

# Pulls real arXiv + OpenAlex data, runs the full analysis, and commits an updated
# data/snapshot.json. The deployed Streamlit app reads that snapshot, so this is
# what keeps the live dashboard on fresh, real data. Runs weekly + on demand.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      max_per_period:
        description: "Max papers per arXiv category per quarter"
        default: "150"
      openalex_max:
        description: "Max papers to enrich via OpenAlex (citations/affiliations)"
        default: "500"

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-full.txt

      - name: Refresh snapshot (real arXiv + OpenAlex)
        env:
          SIGNAL_LAG_MAX_PER_PERIOD: ${{ github.event.inputs.max_per_period || '150' }}
          SIGNAL_LAG_OPENALEX_MAX: ${{ github.event.inputs.openalex_max || '500' }}
          # Optional: add a free key as repo secret SEMANTIC_SCHOLAR_API_KEY for
          # reliable Semantic Scholar enrichment (the keyless pool is rate-limited).
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          python scripts/refresh_snapshot.py --fresh

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          [ -f data/snapshot_prev.json ] && git add data/snapshot_prev.json || true
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore: weekly data refresh $(date -u +%Y-%m-%d)"
            # Rebase onto any concurrent pushes (e.g. docs) before pushing.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
