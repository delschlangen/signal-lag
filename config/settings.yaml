# signal-lag runtime settings. Edit freely; no code changes needed.

ingestion:
  # arXiv categories to pull from.
  arxiv_categories: [cs.AI, cs.LG, cs.CL, cs.CR, cs.CY, cs.CV]
  # Inclusive date window for submissions. If start/end are null, a rolling
  # window of `years_back` ending today is used.
  date_range:
    years_back: 3
    start: null            # e.g. "2022-01-01"
    end: null              # e.g. "2025-01-01"
  # arXiv publishes hundreds of papers/day, so ingestion is stratified by quarter:
  # we pull up to `max_per_period` papers per category per quarter, giving even
  # coverage across the whole date window (so velocity has a real time axis).
  max_per_period: 150
  # Legacy overall per-category cap (no longer the primary control).
  max_results_per_category: 1500
  # arXiv asks for <= 1 request / 3s; we page in chunks of this size.
  arxiv_page_size: 200
  arxiv_request_delay_seconds: 5.0
  # Exponential backoff schedule (seconds) on 429/503/transient errors.
  # arXiv throttles bursts hard, so we back off generously.
  backoff_schedule: [5, 15, 30, 60]
  # OpenAlex "polite pool" contact (faster, friendlier rate limits).
  openalex_mailto: "delschlangen@gmail.com"
  # Cap OpenAlex enrichment calls per run (0 = enrich all cached papers).
  openalex_max_enrich: 0
  # Semantic Scholar enrichment: TLDRs, influential-citation counts, venue, fields.
  # Fail-soft; uses the batch endpoint. Toggle on once the base pipeline is stable.
  semantic_scholar:
    enabled: true
    api_key: null
    max_enrich: 0          # 0 = all cached papers
  # OpenReview venue papers + peer-review scores (added as papers, source=openreview).
  openreview:
    enabled: true
    max_per_venue: 400
    venues:
      - "ICLR.cc/2024/Conference"
      - "ICLR.cc/2025/Conference"
      - "NeurIPS.cc/2024/Conference"
  # Lab/blog RSS — capability-leading signal (kept separate from paper velocity).
  blogs:
    enabled: true
    max_per_feed: 30
    feeds:
      - {name: "Anthropic", url: "https://www.anthropic.com/news/rss.xml"}
      - {name: "OpenAI", url: "https://openai.com/news/rss.xml"}
      - {name: "Google DeepMind", url: "https://deepmind.google/blog/rss.xml"}
      - {name: "Microsoft Research", url: "https://www.microsoft.com/en-us/research/feed/"}

embeddings:
  # Primary local model (downloaded once from HuggingFace). Falls back to a
  # TF-IDF + SVD vectorizer automatically if the model can't be loaded.
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  fallback_svd_components: 256
  batch_size: 64

clustering:
  # "hdbscan" (default) or "kmeans".
  algorithm: hdbscan
  hdbscan:
    min_cluster_size: 15
    min_samples: 5
  kmeans:
    n_clusters: 25
  # Number of top c-TF-IDF terms used to auto-label a cluster.
  label_top_terms: 5

taxonomy:
  # Cosine-similarity threshold for tagging a paper to a taxonomy/capability topic.
  tag_threshold: 0.28
  # A paper may carry multiple tags; cap how many per paper.
  max_tags_per_paper: 3

velocity:
  # Bucket size for time series. "Q" = calendar quarter.
  period: "Q"
  # Window (in periods) used to measure an inflection.
  inflection_window: 2
  # Relative change that counts as an acceleration/deceleration inflection.
  inflection_threshold: 0.30
  # A cluster younger than this many periods is "newly forming".
  new_cluster_max_age_periods: 3

citations:
  # Min citations for a paper to be eligible for "rapid growth" signals.
  min_citations: 5
  # Share of a paper's citations arriving in the recent window to flag "heat".
  recent_window_periods: 4
  recent_share_threshold: 0.5
  # Targeted citation-heat: keyless Semantic Scholar can't enrich all ~12.7k papers
  # within its time budget, so at snapshot-build time fetch real citation counts for
  # JUST the papers driving the foresight gaps (top divergence pairs + emerging quadrant
  # + verified citation-flow borrowers). Bounded + fail-soft; live builds only.
  # (Full by-year citation heat + institutions still require OpenAlex, unreachable in CI.)
  targeted_heat: true
  targeted_heat_max: 300

sentiment:
  # A paper counts as "critical/negative" when cosine similarity of its abstract
  # to the negativity centroid (config/taxonomy.yaml: negativity_seeds) >= this.
  critical_threshold: 0.22
  # Window (quarters) for the recent-vs-prior critical-share trend.
  window: 2
  # Rise in critical share (percentage points, absolute) that triggers a warning.
  rising_share_threshold: 0.08
  # Min papers in a topic's recent window for a sentiment signal to be trusted.
  min_recent_papers: 8
  # Hybrid LLM sentiment (#1): the embedding centroid mistakes academic negation
  # ("we OVERCOME the catastrophic failures of prior methods") for genuine criticism.
  # When enabled AND an api_key is present, the recent-window papers the embedding
  # flagged critical are batch-verified by Claude and false positives are downgraded.
  # Bounded to that subset; fail-soft (no key/disabled => pure embedding behavior).
  llm_verify: true
  # Cap how many recent flagged-critical papers to send for verification (cost guard).
  llm_verify_max: 400
  # Papers per Claude batch for the classifier.
  llm_verify_batch: 50

# Citation-flow verification (#2): does an applied/capability paper ACTUALLY CITE core
# safety work (via OpenAlex referenced_works), not merely share its vocabulary? Local,
# no network; positive-only (absence is inconclusive, never "no borrowing").
citation_flow:
  enabled: true
  # Max verified-borrower examples to surface in the digest.
  max_examples: 30

harm:
  # Harm/misuse dual-use lens: re-tag the SAME papers by which real-world misuse they
  # could enable (config/taxonomy.yaml: harm_topics), tracked as a parallel signal
  # (source="harm") so the tool can foresee how frontier harms may manifest over the
  # next 0-24 months. Independent of the capability/safety views; fail-soft (no
  # harm_topics defined => skipped). The Foresight Gap pass uses accelerating harm
  # vectors to frame capability→harm enablement risks.
  enabled: true
  # Quarter-over-quarter growth that flags a harm vector as "accelerating". Lower than the
  # research-topic threshold (velocity.inflection_threshold=0.30) because harm vectors are
  # large, mature areas where even modest sustained growth is meaningful.
  inflection_threshold: 0.08

divergence:
  # Relative-velocity gap (capability minus safety) that triggers a signal.
  gap_threshold: 0.25
  # Min recent capability volume (papers/quarter) required to flag, so tiny-count
  # topics can't produce noisy alerts.
  min_recent_volume: 3

analysis:
  # Optional weekly LLM analysis (Anthropic / Claude). When enabled AND an
  # ANTHROPIC_API_KEY is present (env var, set into api_key by the refresh script),
  # the computed metrics + real paper abstracts are sent to Claude once per refresh
  # to produce genuine analytical narrative baked into the snapshot. Entirely
  # fail-soft: with no key it's skipped and the dashboard uses its templated text.
  enabled: true
  model: "claude-opus-4-8"
  api_key: null
  # How many representative papers per pairing side to send for grounding.
  papers_per_side: 3
  # Author migration (#4, EXPERIMENTAL leading indicator): using OpenAlex author ids
  # captured during enrichment, flag authors who were capability-dominant historically
  # and whose recent papers enter a safety/oversight topic (capability->safety talent
  # flow can precede a wave of safety work). NOISY by construction (stratified sample +
  # imperfect author ids) — it informs the digest, clearly labeled, and never gates an
  # alert. Fail-soft (no author ids => empty).
  author_migration:
    enabled: true
    # Min prior papers an author needs before a recent safety entry counts as migration.
    min_history: 2
  # Second Claude pass: cross the week's signals with broader societal/contextual
  # trends to surface novel, not-yet-in-the-news risk implications (the seam between
  # research signals and societal forces). Baked into analysis["foresight_gap"];
  # fail-soft (skipped with no api_key), same as the primary analysis.
  foresight:
    enabled: true
    # Number of novel risk implications to generate (2-4 recommended).
    max_risks: 4
    # User-maintained living context file (the current real-world state across
    # societal domains). Edited week-to-week; if missing/empty the pass still runs
    # without the societal layer.
    context_path: "config/context.md"
    # Novelty verification: after synthesis, web-search each candidate risk to check
    # whether it's already publicly discussed and whether any claim it rests on is
    # disputed. Baked into the snapshot (so it's cached, not re-run at page load).
    verify_novelty: true
    # Server-side web search tool version (falls back to web_search_20250305 if the
    # account/platform lacks the newer one).
    web_search_tool: "web_search_20260209"
    # Scenario analysis (Step 3): one extra Claude pass that develops 6-24 month scenarios
    # from the top-priority surfaced risks (narrative, drivers, leading indicators, branch
    # points, candidate mitigations, estimative likelihood). Baked into the snapshot;
    # fail-soft (skipped with no api_key). One call per refresh.
    scenarios: true
    max_scenarios: 3
    # Live web context (#3): the fast arXiv data is crossed with a hand-maintained
    # context.md that can be months stale. When enabled, ONE pre-synthesis web search
    # pulls the CURRENT dated status of the flagged topics' real-world developments, so
    # synthesis verifies any date/policy claim against live ground truth (complements,
    # never replaces, context.md). Baked into the snapshot; fail-soft (-> skipped).
    live_context: true
    # Quality-over-quantity backfill: if fewer than `min_surfaced` risks survive
    # verification (too many came back already-widely-discussed), re-run synthesis for
    # DIFFERENT seams up to `max_rounds` total rounds. Stops early once enough survive.
    # (Kept at 2: a 3rd round added ~5 min of web-search calls for marginal gain.)
    min_surfaced: 3
    max_rounds: 2
  # Step 5 — real-world incident benchmark: cross the upstream research-enablement signal
  # with ACTUAL recent AI-misuse incidents (gathered via Claude web search from the AI
  # Incident Database / OECD / news — the one external-data path that works in CI), tagged
  # to the harm vectors and benchmarked into a leading-vs-lagging 2x2. One web-search call
  # per refresh; fail-soft (skipped with no api_key).
  incidents:
    enabled: true
    max_incidents: 20
    # Min harm-vector quarter-over-quarter growth (%) counted as "research rising".
    rising_pct: 4

  # "This week" lens: alongside the 3-year quarterly view, analyze ONLY papers from the
  # last `window_days`. Adds a focused Claude summary + a full (web-verified) foresight
  # pass over just this week's papers, shown via a toggle on the Summary & Foresight tabs.
  # Fail-soft (skipped with no api_key); the quarterly charts are unaffected.
  weekly:
    enabled: true
    # How many days back counts as "this week" (by paper submission date).
    window_days: 7
    # Ingestion completeness net: an extra arXiv pull of the last N days so the window
    # has complete data even if a category exceeds the quarterly cap (>= window_days).
    recent_topup_days: 14
    # This-week foresight is lighter than the overall pass (fewer candidates/rounds).
    max_risks: 3
    min_surfaced: 2
    max_rounds: 2

paths:
  db_path: "data/signal_lag.sqlite"
  embeddings_path: "data/embeddings.npz"
  brief_output: "data/foresight_brief.md"
  snapshot_path: "data/snapshot.json"
