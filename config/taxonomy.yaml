# Topic taxonomy and capability<->safety pairings.
#
# Each topic has:
#   key:    stable identifier
#   label:  human-readable name
#   kind:   "safety" or "capability"
#   seeds:  short phrases describing the topic. These are embedded and averaged
#           into a centroid; papers are tagged to a topic by cosine similarity
#           between their abstract embedding and the centroid.
#
# Edit/extend freely. The clustering layer ALSO discovers emergent topics that
# are not in this list — this taxonomy is the supervised overlay.

# Seed phrases for the "negative / critical / limitation-focused" signal. A paper
# is counted as critical when its abstract embedding is close to this centroid.
# A rising critical share within a topic (especially while volume is flat) is an
# early warning that a field may be losing confidence in an approach.
negativity_seeds:
  - "this approach does not scale to larger models"
  - "fails to generalize beyond the training distribution"
  - "we find no evidence that"
  - "limitations of current methods"
  - "negative results: the method does not work"
  - "does not reliably improve performance"
  - "performance degrades significantly"
  - "we were unable to reproduce"
  - "contrary to expectations, results show no improvement"
  - "remains an unsolved open problem"
  - "brittle and sensitive to small changes"
  - "the proposed technique underperforms baselines"

safety_topics:
  - key: interpretability
    label: "Mechanistic Interpretability"
    kind: safety
    seeds:
      - "mechanistic interpretability of neural networks"
      - "reverse engineering features and circuits in transformers"
      - "sparse autoencoders for model internals"
      - "probing internal representations of language models"

  - key: cot_faithfulness
    label: "Chain-of-Thought Faithfulness"
    kind: safety
    seeds:
      - "faithfulness of chain-of-thought reasoning"
      - "whether model reasoning traces reflect the true computation"
      - "unfaithful or post-hoc rationalization in step-by-step reasoning"

  - key: scalable_oversight
    label: "Scalable Oversight"
    kind: safety
    seeds:
      - "scalable oversight of AI systems"
      - "debate and recursive reward modeling for supervision"
      - "weak-to-strong generalization and supervising superhuman models"
      - "AI-assisted evaluation of hard-to-judge outputs"

  - key: deceptive_alignment
    label: "Deceptive Alignment"
    kind: safety
    seeds:
      - "deceptive alignment and scheming in AI models"
      - "sandbagging and strategic deception by language models"
      - "models that behave differently under observation"
      - "sleeper agents and hidden backdoored behaviors"

  - key: reward_hacking
    label: "Reward Hacking"
    kind: safety
    seeds:
      - "reward hacking and specification gaming"
      - "reward model overoptimization and Goodhart's law in RLHF"
      - "exploiting flaws in reward functions"

  - key: evals_benchmarks
    label: "Evals & Dangerous-Capability Benchmarks"
    kind: safety
    seeds:
      - "dangerous capability evaluations for frontier models"
      - "safety benchmarks and red-teaming evaluations"
      - "measuring risky capabilities like deception, persuasion, autonomy"

  - key: rsi_control
    label: "Self-Improvement Risk & Control"
    kind: safety
    seeds:
      - "AI control protocols for untrusted models"
      - "containment and control of recursively self-improving AI"
      - "preventing escape and unsafe autonomous self-modification"

  - key: agentic_monitoring
    label: "Agentic Behavior Monitoring"
    kind: safety
    seeds:
      - "monitoring the behavior of autonomous LLM agents"
      - "runtime oversight and guardrails for tool-using agents"
      - "detecting unsafe actions taken by AI agents"

capability_topics:
  - key: agentic_capability
    label: "Agentic / Autonomy Capability"
    kind: capability
    seeds:
      - "autonomous LLM agents that plan and act"
      - "tool-using agents completing long-horizon tasks"
      - "agentic frameworks for web and computer use"

  - key: rl_rlhf
    label: "RL / RLHF Capability"
    kind: capability
    seeds:
      - "reinforcement learning from human feedback to align models"
      - "policy optimization and RL fine-tuning of language models"
      - "preference optimization such as PPO and DPO"

  - key: reasoning_cot
    label: "Reasoning / Chain-of-Thought Capability"
    kind: capability
    seeds:
      - "improving reasoning with chain-of-thought prompting"
      - "test-time compute and deliberate reasoning models"
      - "math and code reasoning in large language models"

  - key: frontier_scaling
    label: "Frontier / Scaling Capability"
    kind: capability
    seeds:
      - "scaling laws for large language models"
      - "pretraining ever larger frontier foundation models"
      - "emergent capabilities from scale"

  - key: multiagent_tooluse
    label: "Multi-Agent / Tool-Use Capability"
    kind: capability
    seeds:
      - "multi-agent collaboration between language models"
      - "tool use and function calling by LLMs"
      - "agent orchestration and role-based agent teams"

  - key: self_improvement
    label: "Self-Improvement / RSI Capability"
    kind: capability
    seeds:
      - "self-improving language models that refine themselves"
      - "recursive self-improvement and self-training"
      - "models generating their own training data and curricula"

# Harm / misuse "vectors": a parallel DUAL-USE lens. Where safety/capability topics
# track the research itself, these track which real-world MISUSE a paper could enable
# — so the tool can foresee how frontier harms may manifest over the next 0-24 months.
# Tagged independently (source="harm"), so the capability<->safety views are unchanged.
# Seeds are framed the way research papers describe these risks (we tag the literature,
# not abuse incidents). Edit/extend freely.
harm_topics:
  - key: cyber_offense
    label: "Offensive Cyber / Autonomous Exploitation"
    kind: harm
    seeds:
      - "LLMs for autonomous vulnerability discovery and exploitation"
      - "AI agents performing penetration testing and cyberattacks"
      - "automated exploit generation and malware synthesis with language models"
      - "using AI to find and weaponize software security flaws"

  - key: bio_chem_uplift
    label: "Bio / Chemical Uplift"
    kind: harm
    seeds:
      - "large language models providing uplift for biological weapons"
      - "AI assistance in chemical and biological threat design"
      - "dual-use risks of AI in life sciences and pathogen research"
      - "frontier models lowering barriers to dangerous biology"

  - key: influence_ops
    label: "Influence Operations / Persuasion"
    kind: harm
    seeds:
      - "AI-generated disinformation and propaganda at scale"
      - "large language models for influence operations and astroturfing"
      - "persuasion and manipulation by conversational AI"
      - "automated coordinated inauthentic behavior on social media"

  - key: scams_fraud
    label: "Scams / Fraud / Social Engineering"
    kind: harm
    seeds:
      - "AI-enabled scams, phishing, and social engineering"
      - "voice cloning and deepfakes for fraud and impersonation"
      - "autonomous agents conducting fraud at scale"
      - "language models generating convincing fraudulent content"

  - key: child_safety
    label: "Child Safety / Exploitation Risk"
    kind: harm
    seeds:
      - "AI-generated child sexual abuse material risks"
      - "grooming and child exploitation via chatbots"
      - "detecting AI-facilitated child sexual exploitation"

  - key: harassment_abuse
    label: "Harassment / Coordinated Abuse"
    kind: harm
    seeds:
      - "AI-generated targeted harassment and abuse"
      - "non-consensual intimate imagery and deepfake harassment"
      - "coordinated abuse and brigading enabled by generative AI"

  - key: agentic_misuse
    label: "Autonomous-Agent Misuse"
    kind: harm
    seeds:
      - "misuse of autonomous AI agents to take harmful real-world actions"
      - "agents pursuing unauthorized or unsafe goals across tools and accounts"
      - "AI agents weaponized for large-scale automated abuse"

  - key: surveillance_privacy
    label: "Surveillance / Privacy Erosion"
    kind: harm
    seeds:
      - "AI-enabled mass surveillance and facial recognition misuse"
      - "deanonymization and re-identification of individuals with AI"
      - "large-scale privacy erosion through model inference of personal data"

  - key: model_exfiltration
    label: "Model / Weight Exfiltration"
    kind: harm
    seeds:
      - "theft and exfiltration of model weights"
      - "model extraction and unauthorized replication of frontier models"
      - "security of model weights against insider and nation-state threats"

  - key: jailbreak_evasion
    label: "Jailbreaks / Guardrail Evasion"
    kind: harm
    seeds:
      - "jailbreaking and prompt injection to bypass safety guardrails"
      - "adversarial attacks that evade content safety filters"
      - "circumventing refusal training and alignment safeguards"

# The headline product: paired capability<->safety topics. Divergence is measured
# as (capability velocity) - (safety velocity) for each pair.
pairings:
  - name: "Agentic capability vs. agentic monitoring"
    capability: agentic_capability
    safety: agentic_monitoring
  - name: "RL/RLHF vs. reward hacking"
    capability: rl_rlhf
    safety: reward_hacking
  - name: "Reasoning/CoT vs. CoT faithfulness"
    capability: reasoning_cot
    safety: cot_faithfulness
  - name: "Frontier scaling vs. evals & dangerous-capability benchmarks"
    capability: frontier_scaling
    safety: evals_benchmarks
  - name: "Multi-agent/tool-use vs. scalable oversight"
    capability: multiagent_tooluse
    safety: scalable_oversight
  - name: "Self-improvement/RSI vs. deceptive alignment"
    capability: self_improvement
    safety: deceptive_alignment
